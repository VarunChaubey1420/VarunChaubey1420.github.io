<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
</head>
<body>

<div class="app">
 
    <!-- Screens -->
    <div id="home" class="screen active">
        <h2>📊 Dashboard</h2>

        <div class="card">
            <p>Total: <span id="total">0</span></p>
            <p>Attended: <span id="attended">0</span></p>
            <p>Attendance: <span id="percentage">0%</span></p>

            <div class="progress-bar">
                <div id="progress"></div>
            </div>

            <p id="status"></p>
            <p id="bunk"></p><br>

            <button onclick="resetData()">Reset</button>
        </div>
    </div>

    <div id="update" class="screen">
        <h2>➕ Update</h2>

        <div class="card">
            <input type="number" id="todayLectures" placeholder="Lectures today">
            <input type="number" id="todayAttended" placeholder="Attended today">
            <button onclick="updateAttendance()">Update</button>
        </div>

    </div>

    <!-- Bottom Nav -->
    <div class="nav">
        <button onclick="showScreen('home')">🏠</button>
        <button onclick="showScreen('update')">➕</button>
    </div>

</div>
<div id="toast">Done ✅</div>
<script src="script.js"></script>
</body>
</html>
